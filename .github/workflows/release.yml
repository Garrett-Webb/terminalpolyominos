name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ curl libfuse2t64 || \
            sudo apt-get install -y cmake g++ curl libfuse2

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/AppRun packaging/appimage/build.sh
          ./packaging/appimage/build.sh

      - name: Checksums
        run: |
          cd dist
          sha256sum terminalpolyominos-*.AppImage | tee SHA256SUMS-${{ matrix.arch }}.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: |
            dist/terminalpolyominos-*.AppImage
            dist/SHA256SUMS-*.txt

  publish:
    name: GitHub Release
    needs: appimage
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download AppImages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p dist
          find release-assets -type f \( -name '*.AppImage' -o -name 'SHA256SUMS-*.txt' \) \
            -exec cp -v {} dist/ \;
          cd dist
          cat SHA256SUMS-*.txt | sort > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES="$(cat <<EOF
          ## terminalpolyominos ${VERSION}

          Colored polyomino stacking game for Unix terminals. **Run the AppImage from a terminal.**

          ### Download
          | Asset | Arch |
          |---|---|
          | \`terminalpolyominos-${VERSION}-x86_64.AppImage\` | Intel/AMD 64-bit |
          | \`terminalpolyominos-${VERSION}-aarch64.AppImage\` | ARM64 (Asahi, Pi, etc.) |

          ### Run
          \`\`\`bash
          chmod +x terminalpolyominos-${VERSION}-*.AppImage
          ./terminalpolyominos-${VERSION}-x86_64.AppImage   # or aarch64
          \`\`\`

          Verify: \`sha256sum -c SHA256SUMS.txt\`

          Config: \`~/.config/tpoly/.tpolyrc\`
          EOF
          )"
          # If the release already exists (re-run), upload assets only.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "terminalpolyominos ${VERSION}" \
              --notes "$NOTES"
          fi
