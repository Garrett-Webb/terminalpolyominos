name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ curl python3 libfuse2t64 || \
            sudo apt-get install -y cmake g++ curl python3 libfuse2

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/AppRun packaging/appimage/build.sh
          ./packaging/appimage/build.sh

      - name: Checksums
        run: |
          cd dist
          sha256sum terminalpolyominos-*.AppImage | tee SHA256SUMS-linux-${{ matrix.arch }}.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: |
            dist/terminalpolyominos-*.AppImage
            dist/SHA256SUMS-linux-*.txt

  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: x86_64
            cmake_osx_arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS package
        env:
          MAC_ARCH: ${{ matrix.arch }}
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_osx_arch }}
        run: |
          chmod +x packaging/macos/build.sh
          # Separate build dirs so arm64 / x86_64 don't clobber each other.
          ./packaging/macos/build.sh "build-release-${{ matrix.arch }}"

      - name: Checksums
        run: |
          cd dist
          shasum -a 256 terminalpolyominos-*-macos-${{ matrix.arch }}.tar.gz \
            | tee SHA256SUMS-macos-${{ matrix.arch }}.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/terminalpolyominos-*-macos-${{ matrix.arch }}.tar.gz
            dist/SHA256SUMS-macos-*.txt

  publish:
    name: GitHub Release
    needs: [appimage, macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p dist
          find release-assets -type f \( \
              -name '*.AppImage' -o -name '*.tar.gz' -o -name 'SHA256SUMS-*.txt' \
            \) -exec cp -v {} dist/ \;
          cd dist
          cat SHA256SUMS-*.txt | sort > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES="$(cat <<EOF
          ## terminalpolyominos ${VERSION}

          Colored polyomino stacking for Unix terminals. **Run from a real terminal.**

          ### Download
          | Asset | Platform |
          |---|---|
          | \`terminalpolyominos-${VERSION}-x86_64.AppImage\` | Linux x86_64 |
          | \`terminalpolyominos-${VERSION}-aarch64.AppImage\` | Linux ARM64 |
          | \`terminalpolyominos-${VERSION}-macos-arm64.tar.gz\` | macOS Apple Silicon |
          | \`terminalpolyominos-${VERSION}-macos-x86_64.tar.gz\` | macOS Intel |

          ### Linux
          \`\`\`bash
          chmod +x terminalpolyominos-${VERSION}-*.AppImage
          ./terminalpolyominos-${VERSION}-\$(uname -m).AppImage
          \`\`\`

          ### macOS
          \`\`\`bash
          tar -xzf terminalpolyominos-${VERSION}-macos-\$(uname -m).tar.gz
          chmod +x terminalpolyominos
          ./terminalpolyominos
          \`\`\`
          If Gatekeeper blocks it: right-click → Open, or \`xattr -dr com.apple.quarantine terminalpolyominos\`.

          Verify: \`sha256sum -c SHA256SUMS.txt\` (or \`shasum -a 256 -c\` on macOS)

          Config: \`~/.config/tpoly/.tpolyrc\`
          EOF
          )"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "terminalpolyominos ${VERSION}" \
              --notes "$NOTES"
          fi
